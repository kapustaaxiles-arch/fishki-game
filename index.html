<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌸 Фишки Sakura 3.0</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="header">
<h1>🌸 Фишки Sakura 3.0</h1>

<div class="stats">
<div>💰 <span id="coins">0</span></div>
<div>⭐ Уровень: <span id="level">1</span></div>
<div>⚡ XP: <span id="xp">0</span></div>
<div>📚 Фишек: <span id="count">0</span></div>
</div>

</div>

<div class="card">

<h2>🎁 Паки</h2>

<button class="primary" onclick="openPack(100)">
Базовый пак (100)
</button>

<button class="blue" onclick="openPack(500)">
Редкий пак (500)
</button>

<button class="gold" onclick="openPack(2000)">
Легендарный пак (2000)
</button>

<button class="primary" onclick="dailyReward()">
📅 Ежедневная награда
</button>

</div>

<div class="card">

<h2>🏆 Последняя фишка</h2>

<div id="lastChip">
Открой пак
</div>

</div>

<div class="card">

<h2>📚 Коллекция</h2>

<div id="collection" class="grid">
</div>

</div>

</div>

<script src="chips.js"></script>
<script src="app.js"></script>

</body>
</html>
